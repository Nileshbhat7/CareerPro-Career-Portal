<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md dark:bg-[#0b1c30]/80 border-b border-slate-200/80 dark:border-slate-800/85 transition-all duration-300">
  <div class="flex justify-between items-center w-full px-6 md:px-12 max-w-7xl mx-auto h-16">
    
    <!-- Logo -->
    <a routerLink="/" class="font-headline text-2xl font-black text-slate-900 dark:text-white flex items-center gap-2 select-none">
      <span class="material-symbols-outlined text-blue-600 dark:text-blue-400">work</span>
      CareerPro
    </a>

    <!-- Navigation Links -->
    <nav class="hidden md:flex items-center gap-8">
      <a routerLink="/" routerLinkActive="text-blue-600 dark:text-blue-400 font-semibold" [routerLinkActiveOptions]="{exact: true}" 
         class="font-body text-sm text-slate-550 dark:text-slate-350 hover:text-blue-650 dark:hover:text-white transition-colors duration-200">
        Home
      </a>
      <a routerLink="/jobs" routerLinkActive="text-blue-600 dark:text-blue-400 font-semibold"
         class="font-body text-sm text-slate-550 dark:text-slate-350 hover:text-blue-650 dark:hover:text-white transition-colors duration-200 relative">
        Browse Jobs
      </a>
      <a routerLink="/jobs" [queryParams]="{ bookmarkedOnly: true }" routerLinkActive="text-blue-600 dark:text-blue-400 font-semibold"
         class="font-body text-sm text-slate-550 dark:text-slate-350 hover:text-blue-650 dark:hover:text-white transition-colors duration-200 flex items-center gap-1.5">
        Bookmarks
        <span *ngIf="bookmarkCount() > 0" class="bg-blue-600 text-white text-xs px-2 py-0.5 rounded-full font-bold">
          {{ bookmarkCount() }}
        </span>
      </a>
    </nav>

    <!-- Actions -->
    <div class="flex items-center gap-4">
      <!-- Theme Toggle Button -->
      <button (click)="themeService.toggleTheme()" id="theme-toggle" aria-label="Toggle Dark Mode"
              class="p-2 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-slate-900 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-300 transition-colors active:scale-95 duration-200">
        <span class="material-symbols-outlined">
          {{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}
        </span>
      </button>

      <!-- Search CTA -->
      <a routerLink="/jobs" 
         class="hidden sm:inline-flex items-center justify-center bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white font-semibold px-5 py-2.5 rounded-xl transition-all active:scale-95 duration-200 shadow-sm shadow-blue-500/10">
        Apply Now
      </a>
    </div>
  </div>
</header>
